[".oh-my-zsh"]
    type = "archive"
    url = "https://github.com/ohmyzsh/ohmyzsh/archive/master.tar.gz"
    stripComponents = 1
    refreshPeriod = "168h"
    exclude = [
        "*/custom",
    ]
[".oh-my-zsh/custom/plugins/zsh-syntax-highlighting"]
    type = "archive"
    url = "https://github.com/zsh-users/zsh-syntax-highlighting/archive/master.tar.gz"
    exact = true
    stripComponents = 1
    refreshPeriod = "168h"
[".tmux/plugins/tpm"]
    type = "archive"
    url = "https://github.com/tmux-plugins/tpm/archive/master.tar.gz"
    exact = true
    stripComponents = 1
    refreshPeriod = "168h"
[".vim/autoload/pathogen.vim"]
    type = "file"
    url = "https://raw.githubusercontent.com/tpope/vim-pathogen/refs/heads/master/autoload/pathogen.vim"
    refreshPeriod = "168h"
[".vim/bundle/vim-colors-solarized"]
    type = "archive"
    url = "https://github.com/altercation/vim-colors-solarized/archive/master.tar.gz"
    exact = true
    stripComponents = 1
    refreshPeriod = "168h"
[".vim/bundle/vim-indent-guides"]
    type = "archive"
    url = "https://github.com/preservim/vim-indent-guides/archive/master.tar.gz"
    exact = true
    stripComponents = 1
    refreshPeriod = "168h"
